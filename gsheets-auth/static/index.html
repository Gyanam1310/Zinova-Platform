<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zinova Auth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #1e293b; }
    label { display: block; font-size: 0.85rem; color: #475569; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #16a34a; }
    button { width: 100%; margin-top: 1.2rem; padding: 11px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #15803d; }
    .msg { margin-top: 1rem; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .msg.ok  { background: #dcfce7; color: #166534; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; font-size: 0.9rem; color: #64748b; }
    .tab.active { background: #16a34a; color: white; border-color: #16a34a; }
    .hidden { display: none; }
    .small { font-size: 0.8rem; color: #94a3b8; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('signup')">Sign Up</button>
    <button class="tab" onclick="showTab('login')">Login</button>
  </div>

  <!-- SIGNUP STEP 1: enter details -->
  <div id="signup-step1">
    <h2>Create account</h2>
    <label>Name</label>
    <input id="s-name" type="text" placeholder="Alice" />
    <label>Email</label>
    <input id="s-email" type="email" placeholder="alice@example.com" />
    <label>Password</label>
    <input id="s-password" type="password" placeholder="••••••••" />
    <button onclick="sendOTP()">Send OTP</button>
    <div id="signup-msg1" class="msg"></div>
  </div>

  <!-- SIGNUP STEP 2: enter OTP -->
  <div id="signup-step2" class="hidden">
    <h2>Enter OTP</h2>
    <p class="small">Check your email for a 6-digit code.</p>
    <label>OTP Code</label>
    <input id="s-otp" type="text" placeholder="123456" maxlength="6" />
    <button onclick="verifyOTP()">Verify & Create Account</button>
    <div id="signup-msg2" class="msg"></div>
  </div>

  <!-- LOGIN -->
  <div id="login-panel" class="hidden">
    <h2>Sign in</h2>
    <label>Email</label>
    <input id="l-email" type="email" placeholder="alice@example.com" />
    <label>Password</label>
    <input id="l-password" type="password" placeholder="••••••••" />
    <button onclick="doLogin()">Sign in</button>
    <div id="login-msg" class="msg"></div>
  </div>
</div>

<script>
  const API = "http://localhost:8001";

  function showTab(tab) {
    document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", (i === 0) === (tab === "signup")));
    document.getElementById("signup-step1").classList.toggle("hidden", tab !== "signup");
    document.getElementById("signup-step2").classList.add("hidden");
    document.getElementById("login-panel").classList.toggle("hidden", tab !== "login");
    clearMsgs();
  }

  function clearMsgs() {
    document.querySelectorAll(".msg").forEach(el => { el.className = "msg"; el.textContent = ""; });
  }

  function showMsg(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + (isError ? "err" : "ok");
  }

  async function sendOTP() {
    const name     = document.getElementById("s-name").value.trim();
    const email    = document.getElementById("s-email").value.trim();
    const password = document.getElementById("s-password").value;
    if (!name || !email || !password) return showMsg("signup-msg1", "Please fill in all fields.", true);

    try {
      const res = await fetch(`${API}/send-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showMsg("signup-msg1", data.detail || "Error sending OTP.", true);
      document.getElementById("signup-step1").classList.add("hidden");
      document.getElementById("signup-step2").classList.remove("hidden");
      showMsg("signup-msg2", data.message, false);
    } catch (e) {
      showMsg("signup-msg1", "Could not reach server.", true);
    }
  }

  async function verifyOTP() {
    const email = document.getElementById("s-email").value.trim();
    const otp   = document.getElementById("s-otp").value.trim();
    if (!otp) return showMsg("signup-msg2", "Please enter the OTP.", true);

    try {
      const res = await fetch(`${API}/verify-otp`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, otp }),
      });
      const data = await res.json();
      if (!res.ok) return showMsg("signup-msg2", data.detail || "Verification failed.", true);
      showMsg("signup-msg2", data.message + " You can now log in.", false);
      setTimeout(() => showTab("login"), 2000);
    } catch (e) {
      showMsg("signup-msg2", "Could not reach server.", true);
    }
  }

  async function doLogin() {
    const email    = document.getElementById("l-email").value.trim();
    const password = document.getElementById("l-password").value;
    if (!email || !password) return showMsg("login-msg", "Please fill in all fields.", true);

    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showMsg("login-msg", data.detail || "Login failed.", true);
      showMsg("login-msg", `Welcome back, ${data.user.name}!`, false);
    } catch (e) {
      showMsg("login-msg", "Could not reach server.", true);
    }
  }
</script>
</body>
</html>
